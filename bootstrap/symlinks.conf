# Symlink mapping for the dotfiles installer.
# Read by bootstrap/install.sh.
#
# FORMAT:
#   source/path → ~/destination/path
#
#   source/path      — path relative to the repository root
#   ~/destination    — path relative to $HOME (~ is expanded to $HOME)
#   →                — separator: space + UTF-8 right arrow (U+2192) + space
#
# RULES:
#   - Lines starting with # are comments — ignored by the installer
#   - Blank lines are ignored
#   - Source path must exist (file or directory) — installer warns if not
#   - Parent directories of the destination are created automatically
#   - If destination already exists and is correct → skipped
#   - If destination already exists and is wrong:
#       without --force → warn and skip
#       with --force    → back up with timestamp and overwrite
#
# ADDING A NEW DOTFILE:
#   1. Add the file to the appropriate directory in this repository
#   2. Add a line here: new/file → ~/.destination
#   3. Re-run: ./bootstrap/install.sh
#
# REMOVING A DOTFILE:
#   1. Delete or comment out the line here
#   2. Remove the symlink manually: rm ~/.destination
#   3. The installer never removes symlinks automatically

# ─────────────────────────────────────────────────────────────────
# SHELL — BASH
# ─────────────────────────────────────────────────────────────────

shell/.bashrc                → ~/.bashrc
shell/.bash_profile          → ~/.bash_profile
shell/.bash_aliases          → ~/.bash_aliases
shell/.inputrc               → ~/.inputrc

# ─────────────────────────────────────────────────────────────────
# SHELL — ZSH
# ─────────────────────────────────────────────────────────────────

shell/.zshrc                 → ~/.zshrc
shell/.zshenv                → ~/.zshenv
shell/aliases.zsh            → ~/.config/zsh/aliases.zsh
shell/functions.zsh          → ~/.config/zsh/functions.zsh
shell/custom.zsh-theme       → ~/.config/zsh/themes/custom.zsh-theme

# ─────────────────────────────────────────────────────────────────
# GIT
# ─────────────────────────────────────────────────────────────────

git/.gitconfig               → ~/.gitconfig
git/.gitignore_global        → ~/.gitignore_global
git/.gitmessage              → ~/.gitmessage

# ─────────────────────────────────────────────────────────────────
# EDITORS — VIM
# ─────────────────────────────────────────────────────────────────

vim/.vimrc                   → ~/.vimrc

# ─────────────────────────────────────────────────────────────────
# EDITORS — VS CODE
# ─────────────────────────────────────────────────────────────────

# VS Code stores its config in different locations depending on the OS:
#   Linux:  ~/.config/Code/User/
#   macOS:  ~/Library/Application Support/Code/User/
#
# These lines work for Linux. If you use macOS, comment the Linux lines
# and uncomment the macOS lines below.

editors/vscode/settings.json    → ~/.config/Code/User/settings.json
editors/vscode/keybindings.json → ~/.config/Code/User/keybindings.json

# macOS (uncomment if needed):
# editors/vscode/settings.json    → ~/Library/Application Support/Code/User/settings.json
# editors/vscode/keybindings.json → ~/Library/Application Support/Code/User/keybindings.json

# ─────────────────────────────────────────────────────────────────
# SYSTEM
# ─────────────────────────────────────────────────────────────────

system/.curlrc               → ~/.curlrc
system/.wgetrc               → ~/.wgetrc
system/.editorconfig         → ~/.editorconfig